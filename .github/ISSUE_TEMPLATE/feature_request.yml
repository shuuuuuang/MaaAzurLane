name: Feature request
description: Request a new task or capability.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: feature
    attributes:
      label: Feature
      description: What should MaaAzurLane do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Daily
        - Sortie
        - Event
        - Operation Siren
        - Scheduler
        - OCR
        - Emulator
        - MCP
        - Other
